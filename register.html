<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Qorex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon">🚀</div>
            <h1>Qorex</h1>
            <p>智能量化交易平台</p>
        </div>
        
        <div class="login-card">
            <h2>创建账号</h2>
            <form action="verify.html">
                <div class="input-group">
                    <label>邮箱</label>
                    <input type="email" placeholder="请输入邮箱" value="demo@qorex.com">
                </div>
                <div class="input-group">
                    <label>手机号</label>
                    <input type="tel" placeholder="请输入手机号" value="+86 138****8888">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" placeholder="至少 8 位，包含字母和数字" value="123456">
                </div>
                <div class="input-group">
                    <label>确认密码</label>
                    <input type="password" placeholder="请再次输入密码" value="123456">
                </div>
                <div class="login-options">
                    <label class="checkbox-label">
                        <input type="checkbox" checked> 我已阅读并同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a>
                    </label>
                </div>
                <button type="submit" class="btn-primary btn-block">注册</button>
            </form>
            <div class="login-footer">
                <p>已有账号？<a href="index.html">立即登录</a></p>
            </div>
        </div>
    </div>
</body>
</html>
