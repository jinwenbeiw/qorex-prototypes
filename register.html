<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qore-X - 注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 48px; margin-bottom: 10px; }
        .logo-title { font-size: 24px; font-weight: bold; color: #1e293b; margin-bottom: 5px; }
        .logo-subtitle { font-size: 14px; color: #64748b; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px; }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: #1296db;
            box-shadow: 0 0 0 3px rgba(18, 150, 219, 0.1);
        }
        .form-input.error { border-color: #ef4444; }
        .error-message { color: #ef4444; font-size: 12px; margin-top: 4px; }
        .password-strength { margin-top: 8px; display: flex; gap: 4px; }
        .strength-bar { flex: 1; height: 4px; background: #e5e7eb; border-radius: 2px; transition: all 0.3s; }
        .strength-bar.weak { background: #ef4444; }
        .strength-bar.medium { background: #f59e0b; }
        .strength-bar.strong { background: #10b981; }
        .verification-code { display: flex; gap: 8px; }
        .verification-code input { flex: 1; }
        .send-code-btn {
            padding: 12px 16px;
            background: #f3f4f6;
            color: #374151;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .send-code-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-options { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 14px; color: #6b7280; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1296db 0%, #0f7fb8 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(18, 150, 219, 0.3); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #6b7280; }
        .login-link a { color: #1296db; text-decoration: none; font-weight: 600; }
        .benefits {
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 8px;
        }
        .benefits-title { font-size: 14px; font-weight: 600; color: #0369a1; margin-bottom: 8px; }
        .benefits ul { list-style: none; }
        .benefits li {
            font-size: 13px;
            color: #0c4a6e;
            margin-bottom: 4px;
            padding-left: 16px;
            position: relative;
        }
        .benefits li:before { content: "✅"; position: absolute; left: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">🚀</div>
            <div class="logo-title">Qore-X</div>
            <div class="logo-subtitle">专业量化交易管理工具</div>
        </div>
        <form id="registerForm">
            <div class="form-group">
                <label class="form-label">📧 邮箱</label>
                <input type="email" class="form-input" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">🔐 验证码</label>
                <div class="verification-code">
                    <input type="text" class="form-input" placeholder="6 位验证码" maxlength="6" required>
                    <button type="button" class="send-code-btn" id="sendCodeBtn">发送验证码</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">🔒 密码（最少 6 位）</label>
                <input type="password" class="form-input" placeholder="••••••••" minlength="6" required id="password">
                <div class="password-strength">
                    <div class="strength-bar" id="strength1"></div>
                    <div class="strength-bar" id="strength2"></div>
                    <div class="strength-bar" id="strength3"></div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">🔒 确认密码</label>
                <input type="password" class="form-input" placeholder="••••••••" required id="confirmPassword">
            </div>
            <div class="form-options">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">我已阅读并同意《服务条款》和《隐私政策》</label>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">注 册</button>
        </form>
        <div class="login-link">
            已有账号？<a href="login.html">立即登录 →</a>
        </div>
        <div class="benefits">
            <div class="benefits-title">🎁 注册福利</div>
            <ul>
                <li>✅ 立享 3 天免费试用</li>
                <li>✅ 无需信用卡</li>
                <li>✅ 支持月费/托管两种方案</li>
            </ul>
        </div>
    </div>
    <script>
        const passwordInput = document.getElementById('password');
        const strengthBars = ['strength1', 'strength2', 'strength3'].map(id => document.getElementById(id));
        passwordInput.addEventListener('input', (e) => {
            const password = e.target.value;
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/) || password.match(/[^a-zA-Z0-9]/)) strength++;
            strengthBars.forEach((bar, index) => {
                bar.className = 'strength-bar';
                if (index < strength) {
                    if (strength === 1) bar.classList.add('weak');
                    else if (strength === 2) bar.classList.add('medium');
                    else bar.classList.add('strong');
                }
            });
        });
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        sendCodeBtn.addEventListener('click', () => {
            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = '已发送';
            let countdown = 60;
            const timer = setInterval(() => {
                countdown--;
                sendCodeBtn.textContent = countdown + '秒后重发';
                if (countdown <= 0) {
                    clearInterval(timer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                }
            }, 1000);
            alert('验证码已发送到您的邮箱！');
        });
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致！');
                return;
            }
            alert('注册成功！请登录');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
