<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qore-X - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 48px; margin-bottom: 10px; }
        .logo-title { font-size: 24px; font-weight: bold; color: #1e293b; margin-bottom: 5px; }
        .logo-subtitle { font-size: 14px; color: #64748b; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px; }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: #1296db;
            box-shadow: 0 0 0 3px rgba(18, 150, 219, 0.1);
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .remember-me { display: flex; align-items: center; gap: 8px; color: #6b7280; }
        .forgot-password { color: #1296db; text-decoration: none; font-weight: 500; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1296db 0%, #0f7fb8 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(18, 150, 219, 0.3);
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }
        .register-link a { color: #1296db; text-decoration: none; font-weight: 600; }
        .security-notice {
            margin-top: 20px;
            padding: 12px;
            background: #fff7ed;
            border-left: 3px solid #f59e0b;
            border-radius: 4px;
            font-size: 12px;
            color: #92400e;
        }
        .benefits {
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 8px;
        }
        .benefits-title { font-size: 14px; font-weight: 600; color: #0369a1; margin-bottom: 8px; }
        .benefits ul { list-style: none; }
        .benefits li {
            font-size: 13px;
            color: #0c4a6e;
            margin-bottom: 4px;
            padding-left: 16px;
            position: relative;
        }
        .benefits li:before { content: "✅"; position: absolute; left: 0; }
        .language-switcher {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .language-btn {
            display: inline-block;
            padding: 6px 12px;
            margin: 0 4px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            background: white;
            color: #6b7280;
            font-size: 13px;
            cursor: pointer;
        }
        .language-btn.active { background: #1296db; color: white; border-color: #1296db; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">🚀</div>
            <div class="logo-title">Qore-X</div>
            <div class="logo-subtitle">专业量化交易管理工具</div>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">📧 邮箱</label>
                <input type="email" class="form-input" placeholder="your@email.com" value="demo@qorex.com">
            </div>
            <div class="form-group">
                <label class="form-label">🔒 密码（最少 6 位）</label>
                <input type="password" class="form-input" placeholder="••••••••" value="123456">
            </div>
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> 记住我（30 天）
                </label>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>
            <button type="submit" class="submit-btn">登 录</button>
        </form>
        <div class="register-link">
            还没有账号？<a href="register.html">立即注册 →</a>
        </div>
        <div class="security-notice">
            <div class="security-notice-title">⚠️ 安全提示</div>
            <ul>
                <li>• 密码错误 5 次将锁定 24 小时</li>
                <li>• 仅支持邮箱验证登录</li>
            </ul>
        </div>
        <div class="benefits">
            <div class="benefits-title">🎁 新用户福利</div>
            <ul>
                <li>✅ 立享 3 天免费试用</li>
                <li>✅ 无需信用卡</li>
                <li>✅ 支持月费/托管两种方案</li>
            </ul>
        </div>
        <div class="language-switcher">
            <button class="language-btn active">🇨🇳 中文</button>
            <button class="language-btn">🇺🇸 English</button>
            <button class="language-btn">🇹🇼 繁體中文</button>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('登录成功！即将跳转到首页...');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
