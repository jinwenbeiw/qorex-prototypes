<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提现 - Qorex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <a href="dashboard.html" class="app-logo">
                    <span class="logo-icon-sm">🚀</span>
                    <span>Qorex</span>
                </a>
                <nav class="main-nav">
                    <a href="dashboard.html" class="nav-item">📊 首页</a>
                    <a href="bills.html" class="nav-item">💰 收益</a>
                    <a href="trades.html" class="nav-item">📈 交易</a>
                    <a href="profile.html" class="nav-item">👤 我的</a>
                </nav>
            </div>
            <div class="header-right">
                <button class="icon-btn">🔔</button>
                <div class="user-menu">
                    <div class="user-avatar">D</div>
                    <span>demo@qorex.com</span>
                </div>
            </div>
        </header>

        <main class="app-main">
            <div class="page-header">
                <h1 class="page-title">提现</h1>
                <p class="page-subtitle">将您的资产提现到外部钱包</p>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 900px;">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">💳 可用余额</h3>
                    </div>
                    <div style="text-align: center; padding: 24px;">
                        <div style="font-size: 2.5em; font-weight: 700; color: var(--primary); margin-bottom: 8px;">
                            3,456.78 USDT
                        </div>
                        <p style="color: var(--text-gray);">约等于 ¥25,123.45</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">📊 本月已提现</h3>
                    </div>
                    <div style="text-align: center; padding: 24px;">
                        <div style="font-size: 2.5em; font-weight: 700; color: var(--success); margin-bottom: 8px;">
                            1,000.00 USDT
                        </div>
                        <p style="color: var(--text-gray);">剩余可提现：9,000.00 USDT/日</p>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-top: 24px; max-width: 900px;">
                <div class="card-header">
                    <h3 class="card-title">提现信息</h3>
                </div>
                <form>
                    <div class="form-group">
                        <label>选择币种</label>
                        <select class="form-control">
                            <option>USDT - Tether</option>
                            <option>BTC - Bitcoin</option>
                            <option>ETH - Ethereum</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>提现地址</label>
                        <input type="text" class="form-control" placeholder="请输入钱包地址" value="0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb">
                        <p style="color: var(--text-gray); font-size: 0.85em; margin-top: 8px;">
                            ⚠️ 请确保地址正确，一旦提交无法撤销
                        </p>
                    </div>

                    <div class="form-group">
                        <label>提现金额</label>
                        <div style="position: relative;">
                            <input type="number" class="form-control" placeholder="请输入金额" value="500" style="padding-right: 80px;">
                            <span style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-gray);">USDT</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.9em;">
                            <span style="color: var(--text-gray);">手续费：1.00 USDT</span>
                            <button type="button" class="btn btn-sm btn-outline">全部提现</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>安全验证</label>
                        <div style="display: flex; gap: 12px;">
                            <input type="text" class="form-control" placeholder="请输入验证码" style="flex: 1;">
                            <button type="button" class="btn btn-outline">获取验证码</button>
                        </div>
                    </div>

                    <div class="card" style="background: var(--bg-light); margin-top: 24px;">
                        <div style="display: flex; justify-content: space-between; padding: 12px 0;">
                            <span style="color: var(--text-gray);">提现金额</span>
                            <strong>500.00 USDT</strong>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--border);">
                            <span style="color: var(--text-gray);">手续费</span>
                            <strong>1.00 USDT</strong>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--border); font-size: 1.1em;">
                            <span style="font-weight: 600;">实际到账</span>
                            <strong style="color: var(--success);">499.00 USDT</strong>
                        </div>
                    </div>

                    <button type="button" class="btn btn-primary btn-block" style="margin-top: 24px; padding: 16px;">
                        确认提现
                    </button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
