<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qore-X - 提现</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Microsoft YaHei', sans-serif; background: #f8fafc; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; color: white; font-size: 20px; font-weight: bold; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .page-title { font-size: 24px; font-weight: bold; color: #1e293b; margin-bottom: 30px; }
        .card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .card-title { font-size: 18px; font-weight: bold; color: #1e293b; margin-bottom: 20px; }
        .balance-info { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .balance-label { font-size: 14px; color: #0369a1; margin-bottom: 5px; }
        .balance-amount { font-size: 32px; font-weight: bold; color: #0c4a6e; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px; transition: all 0.3s; }
        .form-input:focus { outline: none; border-color: #1296db; box-shadow: 0 0 0 3px rgba(18, 150, 219, 0.1); }
        .fee-info { background: #fff7ed; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; color: #92400e; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #1296db 0%, #0f7fb8 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(18, 150, 219, 0.3); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .tab.active { background: #1296db; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span>🚀</span><span>Qore-X</span></div>
    </div>
    <div class="container">
        <div class="page-title">💸 充值/提现</div>
        <div class="tabs">
            <div class="tab active">提现</div>
            <div class="tab">充值</div>
        </div>
        <div class="card">
            <div class="card-title">USDT 提现</div>
            <div class="balance-info">
                <div class="balance-label">可提现余额</div>
                <div class="balance-amount">12,345.67 USDT</div>
            </div>
            <div class="form-group">
                <label class="form-label">提现金额</label>
                <input type="number" class="form-input" placeholder="最少 10 USDT" min="10">
            </div>
            <div class="form-group">
                <label class="form-label">USDT 地址 (TRC20)</label>
                <input type="text" class="form-input" placeholder="输入您的 USDT 地址">
            </div>
            <div class="fee-info">
                💡 手续费：1% (由您承担)<br>
                例如：提现 1000 USDT，实际到账 990 USDT，手续费 10 USDT
            </div>
            <button class="submit-btn">确认提现</button>
        </div>
    </div>
    <script>
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });
    </script>
</body>
</html>
