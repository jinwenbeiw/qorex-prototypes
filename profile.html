<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的 - Qorex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="header-left">
                <span class="page-title">我的</span>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="app-main">
            <!-- 用户信息卡片 -->
            <div class="profile-header-card">
                <div class="user-avatar-large">D</div>
                <div class="user-info">
                    <div class="user-name">DemoUser</div>
                    <div class="user-email">demo@qorex.com</div>
                </div>
                <button class="edit-btn" onclick="location.href='edit-profile.html'">编辑</button>
            </div>

            <!-- 账户统计 -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value">89</div>
                    <div class="stat-label">交易天数</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-value">156</div>
                    <div class="stat-label">总交易次数</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-value">68.5%</div>
                    <div class="stat-label">胜率</div>
                </div>
            </div>

            <!-- 功能列表 -->
            <div class="menu-list">
                <div class="menu-section">账户管理</div>
                
                <div class="menu-item" onclick="location.href='security.html'">
                    <span class="menu-icon">🔒</span>
                    <span class="menu-text">安全设置</span>
                    <span class="menu-arrow">›</span>
                </div>
                
                <div class="menu-item" onclick="location.href='bind-phone.html'">
                    <span class="menu-icon">📱</span>
                    <span class="menu-text">绑定手机</span>
                    <span class="menu-arrow">›</span>
                </div>
                
                <div class="menu-item" onclick="location.href='bind-email.html'">
                    <span class="menu-icon">📧</span>
                    <span class="menu-text">绑定邮箱</span>
                    <span class="menu-arrow">›</span>
                </div>
                
                <div class="menu-item" onclick="location.href='api-keys.html'">
                    <span class="menu-icon">🔑</span>
                    <span class="menu-text">API 管理</span>
                    <span class="menu-arrow">›</span>
                </div>
                
                <div class="menu-item" onclick="location.href='logs.html'">
                    <span class="menu-icon">📝</span>
                    <span class="menu-text">操作日志</span>
                    <span class="menu-arrow">›</span>
                </div>
            </div>

            <div class="menu-list">
                <div class="menu-section">其他</div>
                
                <div class="menu-item" onclick="location.href='about.html'">
                    <span class="menu-icon">🏢</span>
                    <span class="menu-text">关于我们</span>
                    <span class="menu-arrow">›</span>
                </div>
                
                <div class="menu-item" onclick="location.href='help.html'">
                    <span class="menu-icon">❓</span>
                    <span class="menu-text">帮助中心</span>
                    <span class="menu-arrow">›</span>
                </div>
                
                <div class="menu-item" onclick="location.href='settings.html'">
                    <span class="menu-icon">⚙️</span>
                    <span class="menu-text">设置</span>
                    <span class="menu-arrow">›</span>
                </div>
            </div>

            <!-- 退出登录 -->
            <button class="logout-btn" onclick="location.href='index.html'">退出登录</button>
        </main>

        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="bottom-nav-item">
                <span class="bottom-nav-icon">🏠</span>
                <span class="bottom-nav-text">首页</span>
            </a>
            <a href="revenue.html" class="bottom-nav-item">
                <span class="bottom-nav-icon">💰</span>
                <span class="bottom-nav-text">收益</span>
            </a>
            <a href="robot.html" class="bottom-nav-item">
                <span class="bottom-nav-icon">🤖</span>
                <span class="bottom-nav-text">机器人</span>
            </a>
            <a href="profile.html" class="bottom-nav-item active">
                <span class="bottom-nav-icon">👤</span>
                <span class="bottom-nav-text">我的</span>
            </a>
        </nav>
    </div>
</body>
</html>
