<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - Qorex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <a href="dashboard.html" class="app-logo">
                    <span class="logo-icon-sm">🚀</span>
                    <span>Qorex</span>
                </a>
                <nav class="main-nav">
                    <a href="dashboard.html" class="nav-item">📊 首页</a>
                    <a href="bills.html" class="nav-item">💰 收益</a>
                    <a href="trades.html" class="nav-item">📈 交易</a>
                    <a href="profile.html" class="nav-item active">👤 我的</a>
                </nav>
            </div>
            <div class="header-right">
                <button class="icon-btn">🔔</button>
                <div class="user-menu">
                    <div class="user-avatar">D</div>
                    <span>demo@qorex.com</span>
                </div>
            </div>
        </header>

        <main class="app-main">
            <div class="page-header">
                <h1 class="page-title">个人资料</h1>
                <p class="page-subtitle">管理您的账户信息和安全设置</p>
            </div>

            <div style="display: grid; grid-template-columns: 240px 1fr; gap: 24px;">
                <!-- 侧边菜单 -->
                <div class="card" style="height: fit-content;">
                    <nav style="display: flex; flex-direction: column; gap: 4px;">
                        <a href="#" class="nav-item active" style="justify-content: flex-start;">👤 基本信息</a>
                        <a href="#" class="nav-item" style="justify-content: flex-start;">🔒 安全设置</a>
                        <a href="#" class="nav-item" style="justify-content: flex-start;">📱 绑定手机</a>
                        <a href="#" class="nav-item" style="justify-content: flex-start;">📧 绑定邮箱</a>
                        <a href="#" class="nav-item" style="justify-content: flex-start;">🔑 API 管理</a>
                        <a href="#" class="nav-item" style="justify-content: flex-start;">📊 操作日志</a>
                    </nav>
                </div>

                <!-- 主内容 -->
                <div>
                    <div class="card" style="margin-bottom: 24px;">
                        <div class="card-header">
                            <h3 class="card-title">基本信息</h3>
                            <button class="btn btn-primary btn-sm">保存修改</button>
                        </div>
                        <div style="display: flex; align-items: center; gap: 24px; margin-bottom: 24px;">
                            <div class="user-avatar" style="width: 80px; height: 80px; font-size: 2em;">D</div>
                            <div>
                                <button class="btn btn-outline btn-sm">更换头像</button>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group">
                                <label>用户名</label>
                                <input type="text" class="form-control" value="DemoUser">
                            </div>
                            <div class="form-group">
                                <label>邮箱</label>
                                <input type="email" class="form-control" value="demo@qorex.com" disabled style="background: var(--bg-light);">
                            </div>
                            <div class="form-group">
                                <label>手机号</label>
                                <input type="tel" class="form-control" value="+86 138****8888">
                            </div>
                            <div class="form-group">
                                <label>时区</label>
                                <select class="form-control">
                                    <option>Asia/Shanghai (UTC+8)</option>
                                    <option>America/New_York (UTC-5)</option>
                                    <option>Europe/London (UTC+0)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">账户统计</h3>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                            <div style="text-align: center; padding: 20px; background: var(--bg-light); border-radius: 8px;">
                                <div style="font-size: 2em; font-weight: 700; color: var(--primary);">89</div>
                                <div style="color: var(--text-gray); margin-top: 4px;">交易天数</div>
                            </div>
                            <div style="text-align: center; padding: 20px; background: var(--bg-light); border-radius: 8px;">
                                <div style="font-size: 2em; font-weight: 700; color: var(--success);">156</div>
                                <div style="color: var(--text-gray); margin-top: 4px;">总交易次数</div>
                            </div>
                            <div style="text-align: center; padding: 20px; background: var(--bg-light); border-radius: 8px;">
                                <div style="font-size: 2em; font-weight: 700; color: var(--warning);">68.5%</div>
                                <div style="color: var(--text-gray); margin-top: 4px;">胜率</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
