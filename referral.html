<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qore-X - 推广中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Microsoft YaHei', sans-serif; background: #f8fafc; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; color: white; font-size: 20px; font-weight: bold; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .page-title { font-size: 24px; font-weight: bold; color: #1e293b; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        .stat-icon { font-size: 32px; margin-bottom: 10px; }
        .stat-value { font-size: 28px; font-weight: bold; color: #1e293b; margin-bottom: 5px; }
        .stat-label { font-size: 13px; color: #64748b; }
        .card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .card-title { font-size: 18px; font-weight: bold; color: #1e293b; margin-bottom: 20px; }
        .referral-link { display: flex; gap: 10px; margin-bottom: 20px; }
        .referral-input { flex: 1; padding: 12px; background: #f3f4f6; border: none; border-radius: 8px; font-size: 14px; color: #374151; }
        .copy-btn { padding: 12px 24px; background: #1296db; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .qr-section { text-align: center; padding: 20px; background: #f9fafb; border-radius: 12px; }
        .qr-code { width: 200px; height: 200px; background: white; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #9ca3af; }
        .reward-item { padding: 15px; background: #f8fafc; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #10b981; }
        .reward-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .reward-user { font-size: 14px; font-weight: 600; color: #374151; }
        .reward-amount { font-size: 14px; font-weight: 600; color: #10b981; }
        .reward-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; font-size: 12px; color: #6b7280; }
        .withdraw-btn { padding: 8px 16px; background: #1296db; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; float: right; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span>🚀</span><span>Qore-X</span></div>
    </div>
    <div class="container">
        <div class="page-title">🎁 推广中心</div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value">15</div>
                <div class="stat-label">累计推荐</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value">8</div>
                <div class="stat-label">活跃客户</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value">2,345 USDT</div>
                <div class="stat-label">累计奖励</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💸</div>
                <div class="stat-value">567 USDT</div>
                <div class="stat-label">可提现</div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">📤 我的推广链接</div>
            <div class="referral-link">
                <input type="text" class="referral-input" value="https://qorex.com/register?ref=USER10086" readonly>
                <button class="copy-btn">复制链接</button>
            </div>
            <div class="qr-section">
                <div class="qr-code">[二维码图片]</div>
                <p style="font-size: 13px; color: #6b7280;">扫码注册，好友享 5 折优惠</p>
            </div>
        </div>
        <div class="card">
            <div class="card-title">📊 奖励明细</div>
            <div class="reward-item">
                <div class="reward-header">
                    <div class="reward-user">user*** 开通月费专业版</div>
                    <div class="reward-amount">+299.7 USDT</div>
                </div>
                <div class="reward-details">
                    <div>类型：月费分成 (30%)</div>
                    <div>时间：04-06 15:30</div>
                    <div>状态：✅ 已到账</div>
                </div>
            </div>
            <div class="reward-item">
                <div class="reward-header">
                    <div class="reward-user">user*** 利润分成</div>
                    <div class="reward-amount">+99.9 USDT/月</div>
                </div>
                <div class="reward-details">
                    <div>类型：分润分成 (10%)</div>
                    <div>时间：持续中</div>
                    <div>状态：✅ 每月自动</div>
                </div>
                <button class="withdraw-btn">提现</button>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('.copy-btn').addEventListener('click', () => {
            const input = document.querySelector('.referral-input');
            input.select();
            document.execCommand('copy');
            alert('链接已复制！');
        });
    </script>
</body>
</html>
