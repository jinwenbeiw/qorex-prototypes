<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qorex - 智能量化交易平台</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon">🚀</div>
            <h1>Qorex</h1>
            <p>让数据决策，让概率说话</p>
        </div>
        
        <div class="login-card">
            <h2>欢迎回来</h2>
            <form action="dashboard.html">
                <div class="input-group">
                    <label>邮箱 / 手机号</label>
                    <input type="text" placeholder="请输入邮箱或手机号" value="demo@qorex.com">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" placeholder="请输入密码" value="123456">
                </div>
                <div class="login-options">
                    <label class="checkbox-label">
                        <input type="checkbox" checked> 记住我
                    </label>
                    <a href="verify.html">忘记密码？</a>
                </div>
                <button type="submit" class="btn-primary btn-block">登录</button>
            </form>
            <div class="login-footer">
                <p>还没有账号？<a href="register.html">立即注册</a></p>
            </div>
        </div>
        
        <div class="login-features">
            <div class="feature">
                <span class="feature-icon">📊</span>
                <span>AI 智能策略</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🔒</span>
                <span>资金安全</span>
            </div>
            <div class="feature">
                <span class="feature-icon">⚡</span>
                <span>自动托管</span>
            </div>
        </div>
    </div>
</body>
</html>
