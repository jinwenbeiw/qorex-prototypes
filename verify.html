<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qore-X - 验证邮箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo-icon { font-size: 64px; margin-bottom: 20px; }
        .title { font-size: 24px; font-weight: bold; color: #1e293b; margin-bottom: 10px; }
        .subtitle { font-size: 14px; color: #64748b; margin-bottom: 30px; }
        .email-display {
            background: #f3f4f6;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #374151;
        }
        .email-display a { color: #1296db; text-decoration: none; margin-left: 8px; }
        .verification-form { margin-bottom: 30px; }
        .code-inputs { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .code-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .code-input:focus {
            outline: none;
            border-color: #1296db;
            box-shadow: 0 0 0 3px rgba(18, 150, 219, 0.1);
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1296db 0%, #0f7fb8 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(18, 150, 219, 0.3); }
        .resend-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .resend-text { font-size: 14px; color: #6b7280; margin-bottom: 10px; }
        .resend-btn {
            background: none;
            border: none;
            color: #1296db;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }
        .resend-btn:disabled { color: #9ca3af; cursor: not-allowed; text-decoration: none; }
        .tips {
            margin-top: 20px;
            padding: 16px;
            background: #f0f9ff;
            border-radius: 8px;
            text-align: left;
        }
        .tips-title { font-size: 14px; font-weight: 600; color: #0369a1; margin-bottom: 8px; }
        .tips ul { list-style: none; font-size: 13px; color: #0c4a6e; }
        .tips li { margin-bottom: 4px; padding-left: 16px; position: relative; }
        .tips li:before { content: "💡"; position: absolute; left: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-icon">📧</div>
        <div class="title">验证您的邮箱</div>
        <div class="subtitle">我们已发送 6 位验证码至</div>
        <div class="email-display">
            <span id="emailDisplay">your@email.com</span>
            <a href="register.html">修改</a>
        </div>
        <form class="verification-form" id="verifyForm">
            <div class="code-inputs">
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
            </div>
            <button type="submit" class="submit-btn">确 认</button>
        </form>
        <div class="resend-section">
            <div class="resend-text">
                未收到验证码？
                <button class="resend-btn" id="resendBtn">重新发送</button>
            </div>
            <div class="resend-text" id="countdown" style="display: none;">
                <span id="countdownTimer">60</span> 秒后可重发
            </div>
        </div>
        <div class="tips">
            <div class="tips-title">💡 提示</div>
            <ul>
                <li>验证码 5 分钟内有效</li>
                <li>检查垃圾邮件文件夹</li>
                <li>确保邮箱地址正确</li>
            </ul>
        </div>
    </div>
    <script>
        const inputs = document.querySelectorAll('.code-input');
        inputs[0].focus();
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
        document.getElementById('verifyForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const code = Array.from(inputs).map(input => input.value).join('');
            if (code.length !== 6) {
                alert('请输入完整的 6 位验证码');
                return;
            }
            alert('验证成功！');
            window.location.href = 'subscribe.html';
        });
        const resendBtn = document.getElementById('resendBtn');
        const countdown = document.getElementById('countdown');
        const countdownTimer = document.getElementById('countdownTimer');
        resendBtn.addEventListener('click', () => {
            resendBtn.disabled = true;
            countdown.style.display = 'block';
            let seconds = 60;
            const timer = setInterval(() => {
                seconds--;
                countdownTimer.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(timer);
                    resendBtn.disabled = false;
                    countdown.style.display = 'none';
                }
            }, 1000);
            alert('验证码已重新发送，请查收邮箱');
        });
    </script>
</body>
</html>
