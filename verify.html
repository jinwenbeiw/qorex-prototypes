<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证 - Qorex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon">🚀</div>
            <h1>Qorex</h1>
            <p>智能量化交易平台</p>
        </div>
        
        <div class="login-card">
            <h2>身份验证</h2>
            <p style="text-align: center; color: var(--text-gray); margin-bottom: 24px;">
                我们已发送验证码到 demo@qorex.com
            </p>
            <form action="dashboard.html">
                <div class="input-group">
                    <label>验证码</label>
                    <input type="text" placeholder="请输入 6 位验证码" value="123456" style="text-align: center; font-size: 1.5em; letter-spacing: 8px;">
                </div>
                <div style="text-align: center; margin-bottom: 24px;">
                    <a href="#" style="color: var(--primary); text-decoration: none; font-size: 0.9em;">重新发送验证码</a>
                </div>
                <button type="submit" class="btn-primary btn-block">验证</button>
            </form>
            <div class="login-footer">
                <p>返回 <a href="index.html">登录页面</a></p>
            </div>
        </div>
    </div>
</body>
</html>
